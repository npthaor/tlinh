<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Linh | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f9ff; /* Nền xanh pastel siêu nhạt */
            --card-bg: #ffffff;
            --accent-light: #bae6fd; /* Xanh pastel nhấn */
            --accent-dark: #0284c7;  /* Xanh biển đậm cho chữ */
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgb(238, 249, 255) 0%, rgb(219, 240, 255) 90%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- BỐ CỤC BENTO GRID --- */
        .bento-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(200px, auto);
            gap: 24px;
            max-width: 1000px;
            width: 100%;
        }

        /* Style chung cho các thẻ */
        .bento-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(186, 230, 253, 0.4); /* Bóng đổ xanh pastel */
            border: 2px solid #ffffff;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bento-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 50px rgba(186, 230, 253, 0.6);
            border-color: var(--accent-light);
        }

        /* --- THẺ PROFILE (Chiếm 2 cột, 2 hàng) --- */
        .card-profile {
            grid-column: span 2;
            grid-row: span 2;
            background: linear-gradient(135deg, #ffffff, #e0f2fe);
            align-items: flex-start;
        }

        .avatar-placeholder {
            width: 120px;
            height: 120px;
            background: var(--accent-light);
            border-radius: 50%;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--accent-dark);
            border: 4px solid #ffffff;
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.15);
        }

        .hello-badge {
            background: var(--accent-light);
            color: var(--accent-dark);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .name {
            font-size: 48px;
            color: var(--accent-dark);
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .bio {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 600;
            max-width: 400px;
            line-height: 1.6;
        }

        /* --- THẺ EXPERIENCE --- */
        .card-exp {
            grid-column: span 1;
            grid-row: span 1;
            background-color: var(--accent-dark);
            color: #ffffff;
        }

        .card-exp .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .card-exp h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-exp p {
            font-size: 15px;
            opacity: 0.9;
        }

        /* --- THẺ SKILLS --- */
        .card-skill {
            grid-column: span 1;
            grid-row: span 1;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .skill-tag {
            width: 100%;
        }

        .skill-icon {
            font-size: 45px;
            margin-bottom: 15px;
            color: var(--accent-dark);
        }

        .skill-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Hiệu ứng mờ khi cuộn */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media screen and (max-width: 768px) {
            .bento-container {
                grid-template-columns: 1fr;
            }
            .card-profile {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="bento-container fade-in">
        
        <div class="bento-card card-profile">
            <div class="avatar-placeholder">🌸</div>
            <div class="hello-badge">Hello, I'm</div>
            <h1 class="name">Nguyễn Trang Linh</h1>
            <p class="bio">Welcome to my creative space! I love organizing events and connecting people together.</p>
        </div>

        <div class="bento-card card-exp">
            <div class="icon">🎟️</div>
            <h3>Ban tổ chức Forum</h3>
            <p>Lên kế hoạch, điều phối và đảm bảo sự kiện diễn ra thành công tốt đẹp.</p>
        </div>

        <div class="bento-card card-skill">
            <div class="skill-tag">
                <div class="skill-icon">🇬🇧</div>
                <div class="skill-name">Tiếng Anh</div>
            </div>
        </div>

        <div class="bento-card card-skill">
            <div class="skill-tag">
                <div class="skill-icon">🤝</div>
                <div class="skill-name">Teamwork</div>
            </div>
        </div>

    </div>

</body>
</html>
